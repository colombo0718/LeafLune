<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LeafLune YT Banner</title>
  <style>
    body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
    canvas { max-width: 100%; }
    button { padding: 10px 24px; background: #38bdf8; color: #000; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <canvas id="banner" width="2048" height="1152"></canvas>
  <button onclick="download()">下載 PNG</button>

<script>
const canvas = document.getElementById('banner');
const ctx = canvas.getContext('2d');
const W = 2048, H = 1152;

function drawStars() {
  const stars = [
    // 四角星形（大）
    { x: 80,   y: 80,   size: 28, color: '#38bdf8' },
    { x: 1960, y: 100,  size: 22, color: '#38bdf8' },
    { x: 1900, y: 1060, size: 26, color: '#38bdf8' },
    { x: 120,  y: 1050, size: 20, color: '#38bdf8' },
    { x: 1500, y: 200,  size: 16, color: '#38bdf8' },
    { x: 1700, y: 600,  size: 18, color: '#38bdf8' },
    { x: 1200, y: 950,  size: 14, color: '#38bdf8' },
  ];

  stars.forEach(s => draw4Star(s.x, s.y, s.size, s.color));

  // 細小星點
  const dots = [
    [300, 150], [600, 80], [900, 200], [1100, 120], [1400, 300],
    [1600, 180], [1800, 400], [400, 900], [700, 1000], [1000, 850],
    [1300, 1050], [1600, 920], [200, 500], [1850, 700], [500, 600],
    [800, 400], [1100, 700], [1400, 550], [1700, 300], [350, 750],
  ];
  dots.forEach(([x, y]) => {
    ctx.beginPath();
    ctx.arc(x, y, Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();
  });
}

function draw4Star(cx, cy, size, color) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    const angle = (i * Math.PI) / 2 - Math.PI / 2;
    const tip = size;
    const side = size * 0.18;
    ctx.lineTo(Math.cos(angle) * tip, Math.sin(angle) * tip);
    const nextAngle = angle + Math.PI / 4;
    ctx.lineTo(Math.cos(nextAngle) * side, Math.sin(nextAngle) * side);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawBackground() {
  // 深色漸層背景
  const grad = ctx.createRadialGradient(W * 0.35, H * 0.5, 0, W * 0.5, H * 0.5, W * 0.7);
  grad.addColorStop(0, '#0a1628');
  grad.addColorStop(1, '#050814');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawText() {
  // LeafLune 主標題
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 140px system-ui, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText('LeafLune', 380, H * 0.44);

  // Tagline
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.font = '64px system-ui, sans-serif';
  ctx.fillText('學習變有趣，玩樂有價值。', 385, H * 0.62);
}

function drawLeafMoon() {
  // 右側裝飾：幾何葉子
  const lx = 1650, ly = H * 0.42;
  ctx.save();
  ctx.fillStyle = '#38bdf8';
  ctx.beginPath();
  ctx.moveTo(lx, ly - 60);
  ctx.bezierCurveTo(lx + 55, ly - 60, lx + 55, ly + 60, lx, ly + 60);
  ctx.bezierCurveTo(lx - 10, ly + 30, lx - 10, ly - 30, lx, ly - 60);
  ctx.closePath();
  ctx.fill();
  // 葉脈
  ctx.strokeStyle = 'rgba(5,8,20,0.4)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(lx, ly - 55);
  ctx.lineTo(lx, ly + 55);
  ctx.stroke();
  ctx.restore();

  // 右側裝飾：月牙
  const mx = 1800, my = H * 0.42;
  ctx.save();
  ctx.fillStyle = '#FBBF24';
  ctx.beginPath();
  ctx.arc(mx, my, 55, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0a1628';
  ctx.beginPath();
  ctx.arc(mx + 22, my - 8, 46, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function render(logo) {
  drawBackground();
  drawStars();

  // Logo 圖片
  const logoSize = 200;
  const logoX = 120;
  const logoY = H * 0.5 - logoSize / 2;
  ctx.drawImage(logo, logoX, logoY, logoSize, logoSize);

  drawText();
  drawLeafMoon();
}

function download() {
  const a = document.createElement('a');
  a.download = 'leaflune-yt-banner.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

const logo = new Image();
logo.src = 'leaflune_logo_nobg.png';
logo.onload = () => render(logo);
logo.onerror = () => render(null);
</script>
</body>
</html>
